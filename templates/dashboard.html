<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 127.14 96.36" fill="#5865F2" xmlns="http://www.w3.org/2000/svg">
      <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
    <span>Discord Self Bot</span>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link active">Dashboard</a>
    <a href="/settings" class="nav-link">Settings</a>
    <a href="/logout" class="nav-link nav-logout">Logout</a>
  </div>
</nav>

<main class="main-content">

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(88,101,242,.15);color:#8b9aff">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
      </div>
      <div class="stat-body">
        <div class="stat-value" id="statUptime">—</div>
        <div class="stat-label">Uptime</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(235,69,158,.15);color:#eb459e">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.1 15.9 0 13.33 0c-1.6 0-2.98.83-3.84 2.07C8.63 1 7.26.19 5.67.19 3.1.19 1 2.26 1 4.83c0 .48.09.92.18 1.36H1C-.11 6.28-1 7.17-1 8.28v2c0 1.1.89 2 2 2h18c1.1 0 2-.9 2-2v-2c0-1.11-.89-2-2-2zM3 19v2h18v-2H3zm0-4v2h18v-2H3z"/></svg>
      </div>
      <div class="stat-body">
        <div class="stat-value" id="statGiveaways">0</div>
        <div class="stat-label">Giveaways Joined</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(250,166,26,.15);color:#faa61a">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <div class="stat-body">
        <div class="stat-value" id="statQuests">0</div>
        <div class="stat-label">Quests Completed</div>
      </div>
    </div>
  </div>

  <!-- Status Card -->
  <div class="card status-card">
    <div class="status-left">
      <div class="status-dot-wrap">
        <span class="status-dot" id="statusDot"></span>
      </div>
      <div>
        <div class="status-label" id="statusLabel">Đang kiểm tra...</div>
        <div class="status-sub">Discord Self Bot</div>
      </div>
    </div>
    <div class="status-actions">
      <button class="btn btn-success" id="btnStart" onclick="botAction('start')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Bật Bot
      </button>
      <button class="btn btn-danger" id="btnStop" onclick="botAction('stop')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
        Tắt Bot
      </button>
      <button class="btn btn-warning" id="btnRestart" onclick="botAction('restart')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Restart
      </button>
    </div>
  </div>

  <!-- Console Card -->
  <div class="card console-card">
    <div class="console-header">
      <div class="console-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:#5865F2"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10zm-2-1H6v-2h12v2zm0-4H6v-2h12v2zm-4-4H6V7h8v2z"/></svg>
        Console Log
      </div>
      <div class="console-actions">
        <label class="toggle-label">
          <input type="checkbox" id="autoScroll" checked>
          <span>Auto scroll</span>
        </label>
        <button class="btn btn-ghost btn-sm" onclick="clearConsole()">Xóa</button>
      </div>
    </div>
    <div class="console-body" id="consoleBody"></div>
  </div>

</main>

<script src="/static/main.js"></script>
<script>
startPolling();
</script>
</body>
</html>
